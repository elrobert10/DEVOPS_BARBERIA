<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Fondo -->
  <rect width="512" height="512" fill="#1f2937" rx="64"/>
  
  <!-- Tijeras estilizadas -->
  <g transform="translate(256, 256)">
    <!-- Hoja izquierda -->
    <path d="M-80,-60 L-40,0 L-80,60 C-90,65 -100,60 -105,50 C-110,40 -105,25 -95,20 L-80,10 L-95,-10 C-105,-15 -110,-30 -105,-40 C-100,-50 -90,-55 -80,-60 Z" fill="#9ca3af" stroke="#d1d5db" stroke-width="4"/>
    
    <!-- Hoja derecha -->
    <path d="M80,-60 L40,0 L80,60 C90,65 100,60 105,50 C110,40 105,25 95,20 L80,10 L95,-10 C105,-15 110,-30 105,-40 C100,-50 90,-55 80,-60 Z" fill="#9ca3af" stroke="#d1d5db" stroke-width="4"/>
    
    <!-- Conexión central -->
    <circle cx="0" cy="0" r="12" fill="#374151" stroke="#d1d5db" stroke-width="4"/>
    
    <!-- Peine -->
    <g transform="translate(0, 80)">
      <rect x="-40" y="0" width="80" height="60" rx="8" fill="#374151" stroke="#d1d5db" stroke-width="3"/>
      <line x1="-30" y1="15" x2="-30" y2="60" stroke="#d1d5db" stroke-width="3"/>
      <line x1="-15" y1="15" x2="-15" y2="60" stroke="#d1d5db" stroke-width="3"/>
      <line x1="0" y1="15" x2="0" y2="60" stroke="#d1d5db" stroke-width="3"/>
      <line x1="15" y1="15" x2="15" y2="60" stroke="#d1d5db" stroke-width="3"/>
      <line x1="30" y1="15" x2="30" y2="60" stroke="#d1d5db" stroke-width="3"/>
    </g>
  </g>
  
  <!-- Texto -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#f3f4f6" text-anchor="middle">BARBER</text>
</svg>